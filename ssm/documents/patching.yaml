schemaVersion: '2.2'
description: 'Run patch baseline scan/install on Linux instances.'
parameters:
  Operation:
    type: String
    default: Scan
    allowedValues:
      - Scan
      - Install
mainSteps:
  - name: PatchLinux
    action: aws:runShellScript
    precondition:
      StringEquals:
        - platformType
        - Linux
    inputs:
      runCommand:
        - "set -euo pipefail"
        - "op='{{ Operation }}'"
        - "if [ \"$op\" = \"Scan\" ]; then if command -v yum >/dev/null 2>&1; then yum check-update || true; elif command -v apt-get >/dev/null 2>&1; then apt-get -s upgrade || true; else echo 'No supported package manager found' >&2; exit 1; fi; else if command -v yum >/dev/null 2>&1; then yum -y update; elif command -v apt-get >/dev/null 2>&1; then apt-get update -y && apt-get -y upgrade; else echo 'No supported package manager found' >&2; exit 1; fi; fi"
