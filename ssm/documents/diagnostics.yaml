schemaVersion: '2.2'
description: 'Collect OS and application diagnostics for incident triage.'
mainSteps:
  - name: LinuxDiagnostics
    action: aws:runShellScript
    precondition:
      StringEquals:
        - platformType
        - Linux
    inputs:
      runCommand:
        - "uname -a"
        - "uptime"
        - "df -h"
        - "free -m"
        - "systemctl list-units --failed --no-pager"
        - "journalctl -n 200 --no-pager"
  - name: WindowsDiagnostics
    action: aws:runPowerShellScript
    precondition:
      StringEquals:
        - platformType
        - Windows
    inputs:
      runCommand:
        - "Get-ComputerInfo | Select-Object OsName,OsVersion,WindowsVersion"
        - "Get-PSDrive -PSProvider FileSystem"
        - "Get-Service | Where-Object {$_.Status -eq 'Stopped'} | Select-Object -First 50"
        - "Get-EventLog -LogName System -Newest 200"