schemaVersion: '2.2'
description: 'Collect OS and application diagnostics for incident triage.'
mainSteps:
  - name: LinuxDiagnostics
    action: aws:runShellScript
    precondition:
      StringEquals:
        - platformType
        - Linux
    inputs:
      runCommand:
        - "uname -a"
        - "uptime"
        - "df -h"
        - "free -m"
        - "systemctl list-units --failed --no-pager"
        - "journalctl -n 200 --no-pager"
