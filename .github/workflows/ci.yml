name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  terraform-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Validate modules
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r module; do
            terraform -chdir="${module}" init -backend=false -input=false -no-color
            terraform -chdir="${module}" validate -no-color
          done < <(find modules -mindepth 1 -maxdepth 1 -type d | sort)

      - name: Validate stacks
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r stack; do
            terraform -chdir="${stack}" init -backend=false -input=false -no-color
            terraform -chdir="${stack}" validate -no-color
          done < <(find stacks -mindepth 1 -maxdepth 1 -type d | sort)

      - name: Lambda tests
        run: pytest -q tests
